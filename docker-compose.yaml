services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    environment:
      APP_ENV: dev
      APP_CMD: "${APP_CMD_DEV:-python -m pytest -q}"
    command: []

  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: prod
      APP_CMD: "${APP_CMD_PROD:-python -c 'print(\"Set APP_CMD_PROD for prod run\")'}"
    command: []
