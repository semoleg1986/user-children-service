name: provider-contract

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/export_openapi.py"
      - "openapi.yaml"
      - "requirements*.txt"
      - "requirements.in"
      - ".github/workflows/provider-contract.yml"
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/export_openapi.py"
      - "openapi.yaml"

jobs:
  provider-contract:
    runs-on: ubuntu-latest
    env:
      AUTH_JWKS_URL: http://jwks.local
      AUTH_ISSUER: auth-service
      AUTH_AUDIENCE: user-children-service
      AUTH_ALGORITHMS: RS256

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check OpenAPI artifact is in sync
        run: make openapi-check

      - name: Run tests
        run: make test
